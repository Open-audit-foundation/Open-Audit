# docker-compose.yml — full local development stack.
#
# Usage:
#   cp .env.example .env.local   # fill in Stellar endpoint vars
#   docker compose up --build
#
# Services boot in dependency order: redis → app.
# Health checks ensure redis is accepting connections before the app starts.

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Persist data across container restarts during local development.
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "3000:3000"   # HTTP dashboard + WebSocket (/ws/events on same port)
    env_file:
      - .env.local    # NEXT_PUBLIC_* and SENTRY_DSN live here
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Point the app at the compose-networked Redis instance.
      REDIS_URL: redis://redis:6379
      # Retention policy — override as needed for your environment.
      RETENTION_DAYS: "180"
      RETENTION_BATCH_SIZE: "500"
      RETENTION_ARCHIVE_DIR: /app/archives
      RETENTION_CRON: "0 2 * * *"
      RETENTION_ENABLED: "true"
      RETENTION_DRY_RUN: "false"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      # Persist CSV archives outside the container for cold-storage upload
      - archive_data:/app/archives

volumes:
  redis_data:
  archive_data:
